name: API CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'obs-controller-api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'obs-controller-api/**'
  workflow_dispatch:

concurrency:
  group: api-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: obs-controller-api

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: obs-controller-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Verify server starts
        run: |
          timeout 5 node server.js &
          SERVER_PID=$!
          sleep 2
          curl -sf http://localhost:3010/health || echo "Health endpoint not available (expected if not implemented)"
          kill $SERVER_PID 2>/dev/null || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: obs-controller-api
          push: false
          tags: obs-controller-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
