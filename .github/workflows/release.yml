name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('obs-remote-camera/**/*.gradle.kts') }}

      - name: Decode release keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        working-directory: obs-remote-camera
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build APKs
        working-directory: obs-remote-camera
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            obs-remote-camera/app/build/outputs/apk/debug/*.apk
            obs-remote-camera/app/build/outputs/apk/release/*.apk

  docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        service:
          - name: obs-controller-api
            context: obs-controller-api
          - name: obs-controller-web
            context: obs-controller-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.service.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [android-apk, docker-images]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: release-assets/

      - name: Flatten APK files
        run: |
          mkdir -p flat-assets
          find release-assets -name "*.apk" -exec cp {} flat-assets/ \;
          ls -la flat-assets/

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OBS Controller v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: flat-assets/*.apk
          generate_release_notes: true
          body: |
            ## OBS Controller v${{ steps.version.outputs.version }}

            ### Componentes
            - **obs-remote-camera** — App Android para transmisión SRT
            - **obs-controller-api** — Backend Node.js (puerto 3010)
            - **obs-controller-web** — Frontend Vue 3 (puerto 5180)
            - **obs-auto-camera-switcher** — IA auto-switch (puerto 3020)

            ### Instalación APK
            1. Descargar el APK adjunto
            2. Instalar en el celular (habilitar "Fuentes desconocidas")
            3. Configurar host Tailscale y número de cámara
