server {
    listen 5180;
    root /usr/share/nginx/html;
    index index.html;

    # ── Vue SPA ──────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Descargas (APK y version.json) ───────────────────────────────────────
    location /downloads/ {
        alias /downloads/;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control 'no-cache';
        add_header Access-Control-Allow-Origin *;
        autoindex off;
    }

    # ── Proxy HLS → MediaMTX :8888 ───────────────────────────────────────────
    # El browser solicita /hls/cam1/index.m3u8
    # nginx lo reenvía a http://host:8888/cam1/index.m3u8
    # Puerto 5180 ya está abierto en el firewall — no se necesitan nuevos puertos.
    location /hls/ {
        proxy_pass http://host.docker.internal:8888/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control no-cache;
    }
}
